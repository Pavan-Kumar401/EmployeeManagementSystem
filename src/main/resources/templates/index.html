<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Employee Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        rgba(15,23,42,0.55),
        rgba(30,41,59,0.55)
    ),
    url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=80');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    width:520px;
    padding:50px 45px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.18);

    border-radius:24px;

    box-shadow:
        0 8px 32px rgba(0,0,0,0.25);

    text-align:center;
}

h1{
    font-size:48px;
    font-weight:700;
    color:white;
    line-height:1.2;
    margin-bottom:20px;
}

p{
    font-size:20px;
    color:#e2e8f0;
    margin-bottom:35px;
}

.btn{
    display:block;
    width:100%;
    padding:16px;
    margin-bottom:18px;
    text-decoration:none;
    font-size:20px;
    font-weight:600;
    border-radius:14px;
    transition:0.3s ease;
}

.admin-btn{
    background:#2563eb;
    color:white;
}

.admin-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.employee-btn{
    background:#14b8a6;
    color:white;
}

.employee-btn:hover{
    background:#0f766e;
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#cbd5e1;
}

</style>
</head>
<body>

<div class="container">

    <h1>Employee Management System</h1>

    <p>
        Smart workforce management for your organization
    </p>

    <a href="/admin/login" class="btn admin-btn">
        Administrator Access
    </a>

    <a href="/employee/portal" class="btn employee-btn">
        Employee Access
    </a>

    <div class="footer">
        Manage employees • leave requests • profiles • attendance
    </div>

</div>

</body>
</html>
