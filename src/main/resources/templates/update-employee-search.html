<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Employee</title>

<link rel="stylesheet" href="/css/admin-style.css">

<style>

.container{
    max-width:700px;
    margin-top:80px;
}

.search-form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.search-form button{
    margin-top:0;
}

.error{
    color:#fca5a5;
    text-align:center;
    margin-top:18px;
    font-size:15px;
    font-weight:500;
}

</style>
</head>
<body>

<div class="container">

    <h2>Update Employee Details</h2>

    <form th:action="@{/admin/find-employee}"
          method="post"
          class="search-form">

        <input
            type="number"
            name="id"
            placeholder="Enter Employee ID"
            required>

        <button type="submit">
            Find Employee
        </button>

        <a href="/admin/dashboard" class="back-btn">
            Back to Dashboard
        </a>

    </form>

    <p th:if="${error}"
       th:text="${error}"
       class="error"></p>

</div>

</body>
</html>
