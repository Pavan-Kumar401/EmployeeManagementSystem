<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add New Employee</title>

<link rel="stylesheet" href="/css/admin-style.css">

<style>

.button-group{
    display:flex;
    gap:16px;
    margin-top:30px;
}

.save-btn{
    flex:1;
    margin-top:0;
}

.back-btn{
    flex:1;
}

.back-btn:hover{
    background:#1d4ed8;
}

/* designation dropdown */
select{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.12);
    font-size:15px;
    outline:none;
}

@media(max-width:768px){
    .button-group{
        flex-direction:column;
    }
}

</style>

</head>
<body>

<div class="container">

<h2>Add New Employee</h2>

<form th:action="@{/admin/save-employee}"
      th:object="${employee}"
      method="post">

    <label>First Name</label>
    <input type="text" th:field="*{firstName}" required>

    <label>Last Name</label>
    <input type="text" th:field="*{lastName}" required>

    <label>Date of Birth</label>
    <input type="date" th:field="*{dob}" required>

    <label>Current Address</label>
    <input type="text" th:field="*{address}" required>

    <label>Mobile Number</label>
    <input type="text" th:field="*{mobile}" required>

    <label>Email Address</label>
    <input type="email" th:field="*{email}" required>

    <label>Designation</label>
    <select th:field="*{department}" required>
        <option value="">Select Designation</option>
        <option value="Software Engineer">Software Engineer</option>
        <option value="Frontend Developer">Frontend Developer</option>
        <option value="Backend Developer">Backend Developer</option>
        <option value="Full Stack Developer">Full Stack Developer</option>
        <option value="QA Engineer">QA Engineer</option>
        <option value="DevOps Engineer">DevOps Engineer</option>
        <option value="UI/UX Designer">UI/UX Designer</option>
        <option value="Data Analyst">Data Analyst</option>
        <option value="Project Manager">Project Manager</option>
        <option value="Tech Lead">Tech Lead</option>
        <option value="HR">HR</option>
        <option value="Manager">Manager</option>
    </select>

    <label>Manager Name</label>
    <input type="text" th:field="*{managerName}" required>

    <label>Date of Joining</label>
    <input type="date" th:field="*{joiningDate}" required>

    <label>Salary</label>
    <input type="number" th:field="*{salary}" required>

    <div class="button-group">

        <button type="submit" class="save-btn">
            Save Employee
        </button>

        <a href="/admin/dashboard" class="back-btn">
            Back to Dashboard
        </a>

    </div>

</form>

</div>

</body>
</html>
