<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Search Employee</title>

<link rel="stylesheet" href="/css/admin-style.css">

<style>

/* Wider page */
.container{
    max-width:1100px;
}

/* Search Row */
.search-box{
    display:flex;
    gap:12px;
    margin-bottom:28px;
}

.search-box input{
    flex:1;
}

.search-box button{
    width:auto;
    margin-top:0;
    padding:14px 24px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:16px;
}

th{
    padding:16px;
    text-align:center;
    background:rgba(37,99,235,0.88);
    color:white;
}

td{
    padding:16px;
    text-align:center;
    color:white;
    background:rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:nth-child(even) td{
    background:rgba(255,255,255,0.05);
}

tbody tr:hover td{
    background:rgba(255,255,255,0.12);
}

/* Back button */
.btn-wrapper{
    display:flex;
    justify-content:center;
    margin-top:28px;
}

.back-btn:hover{
    background:#1d4ed8;
}

/* Mobile */
@media(max-width:768px){

    .search-box{
        flex-direction:column;
    }

    .search-box button{
        width:100%;
    }

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }
}

</style>
</head>
<body>

<div class="container">

    <h2>Search Employee</h2>

    <form th:action="@{/admin/search}" method="post">

        <div class="search-box">

            <input
                type="text"
                name="keyword"
                placeholder="Enter Employee ID or First Name"
                required>

            <button type="submit">
                Search
            </button>

        </div>

    </form>

    <table th:if="${employees != null}">

        <tr>
            <th>ID</th>
            <th>Employee Name</th>
            <th>Designation</th>
            <th>Email</th>
            <th>Mobile</th>
        </tr>

        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.firstName + ' ' + emp.lastName}"></td>
            <td th:text="${emp.department}"></td>
            <td th:text="${emp.email}"></td>
            <td th:text="${emp.mobile}"></td>
        </tr>

    </table>

    <div class="btn-wrapper">
        <a href="/admin/dashboard" class="back-btn">
            Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
