<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link rel="stylesheet" href="/css/employee-style.css">

<style>

/* page center */
body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* card */
.container{
    max-width:430px;
    width:100%;

    padding:40px 34px;
}

/* heading */
h2{
    text-align:center;
    color:white;
    font-size:34px;
    margin-bottom:26px;
}

/* input spacing */
input{
    width:100%;
    margin-bottom:16px;
    box-sizing:border-box;
}

/* reset button */
button{
    width:100%;
    margin-top:6px;
}

/* back button */
.dashboard-btn{
    display:block;
    width:100%;
    margin-top:18px;
    padding:15px;

    background:#334155 !important;
    color:white !important;

    text-align:center;
    text-decoration:none;

    font-size:18px;
    font-weight:600;

    border-radius:12px;
    box-sizing:border-box;
}

.dashboard-btn:hover{
    background:#475569 !important;
}

/* messages */
.error{
    color:#fca5a5;
    text-align:center;
    margin-top:14px;
    font-size:14px;
}

.success{
    color:#86efac;
    text-align:center;
    margin-top:14px;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

    <h2>Reset Password</h2>
`
    <form th:action="@{/employee/forgot-password}" method="post">

        <input
            type="text"
            name="employeeCode"
            placeholder="Employee Code"
            required>

        <input
            type="email"
            name="email"
            placeholder="Registered Email Address"
            required>

        <input
            type="password"
            name="newPassword"
            placeholder="Enter New Password"
            required>

        <button type="submit">
            Reset Password
        </button>

    </form>

    <p th:if="${error}"
       th:text="${error}"
       class="error"></p>

    <p th:if="${success}"
       th:text="${success}"
       class="success"></p>

    <a href="/employee/dashboard" class="dashboard-btn">
        Back to Dashboard
    </a>

</div>

</body>
</html>
