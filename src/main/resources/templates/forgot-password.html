<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link rel="stylesheet" href="/css/employee-style.css">

<style>

/* reset password card */
.container{
    max-width:430px;
    padding:40px 34px;
}

/* heading */
h2{
    text-align:center;
    color:white;
    font-size:34px;
    margin-bottom:26px;
}

/* input spacing */
input{
    margin-bottom:16px;
}

/* button */
button{
    width:100%;
    margin-top:6px;
}

/* messages */
.error{
    color:#fca5a5;
    text-align:center;
    margin-top:14px;
    font-size:14px;
}

.success{
    color:#86efac;
    text-align:center;
    margin-top:14px;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

<h2>Reset Password</h2>

<form th:action="@{/employee/forgot-password}" method="post">

    <input
        type="text"
        name="employeeCode"
        placeholder="Employee Code"
        required>

    <input
        type="email"
        name="email"
        placeholder="Registered Email Address"
        required>

    <input
        type="password"
        name="newPassword"
        placeholder="Enter New Password"
        required>

    <button type="submit">
        Reset Password
    </button>

</form>

<p th:if="${error}"
   th:text="${error}"
   class="error"></p>

<p th:if="${success}"
   th:text="${success}"
   class="success"></p>

</div>

</body>
</html>
