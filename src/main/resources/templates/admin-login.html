<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<link rel="stylesheet" href="/css/admin-style.css">

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.login-box{
    width:420px;
    padding:45px 40px;
    border-radius:24px;

    background:rgba(15,23,42,0.62);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border:1.5px solid rgba(255,255,255,0.18);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.12),
        0 0 0 1px rgba(255,255,255,0.08),
        0 18px 45px rgba(0,0,0,0.35);

    text-align:center;
}

.login-box h2{
    color:white;
    font-size:42px;
    margin-bottom:28px;
}

.login-box input{
    width:100%;
    padding:15px 18px;
    margin:12px 0;

    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);

    background:rgba(255,255,255,0.08);
    color:white;
}

.login-box input::placeholder{
    color:rgba(255,255,255,0.75);
}

.login-box button{
    width:100%;
    margin-top:15px;
}

.error{
    color:#fca5a5;
    margin-bottom:14px;
}

.back-link{
    margin-top:20px;
}

.back-link a{
    color:white;
    text-decoration:none;
}

.back-link a:hover{
    color:#93c5fd;
}
</style>

</head>

<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/admin/login}" method="post">

        <input
            type="text"
            name="username"
            placeholder="Enter username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="back-link">
        <a href="/">← Back to Home</a>
    </div>

</div>

</body>
</html>
