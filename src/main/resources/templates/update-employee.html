<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Employee</title>

<link rel="stylesheet" href="/css/admin-style.css">

<style>

.container{
    max-width:720px;
}

/* Buttons row */
.button-group{
    display:flex;
    gap:20px;
    margin-top:30px;
}

/* Equal width for both button + link */
.button-group button,
.button-group a{
    flex:1;
    min-width:0;
    margin-top:0;
}

/* Keep dashboard button blue like primary button */
.back-btn{
    text-align:center;
}

.back-btn:hover{
    background:#1d4ed8;
}

/* Mobile */
@media(max-width:768px){
    .button-group{
        flex-direction:column;
    }
}

</style>
</head>
<body>

<div class="container">

<h2>Edit Employee Details</h2>

<form th:action="@{/admin/update-employee}"
      th:object="${employee}"
      method="post">

<input type="hidden" th:field="*{id}">

<label>First Name</label>
<input type="text" th:field="*{firstName}">

<label>Last Name</label>
<input type="text" th:field="*{lastName}">

<label>Address</label>
<input type="text" th:field="*{address}">

<label>Mobile</label>
<input type="text" th:field="*{mobile}">

<label>Email</label>
<input type="email" th:field="*{email}">

<label>Designation</label>
<input type="text" th:field="*{department}">

<label>Manager Name</label>
<input type="text" th:field="*{managerName}">

<label>Salary</label>
<input type="number" th:field="*{salary}">

<div class="button-group">

<button type="submit" class="update-btn">
    Update Employee
</button>

<a href="/admin/dashboard" class="back-btn">
    Back to Dashboard
</a>

</div>

</form>

</div>

</body>
</html>
